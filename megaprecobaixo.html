/* =========================

========================= */

.topbar{
    width: 100%;
    height: 60px;

    background: #0089c4;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 25px;

    position: fixed;
    top: 0;
    left: 0;

    z-index: 99999;

    box-shadow: 0 2px 10px rgba(0,0,0,.15);
}

/* botão voltar */
.btn-voltar{
    background: white;
    color: #0089c4;

    border: none;
    border-radius: 5px;

    padding: 8px 16px;

    font-weight: bold;

    cursor: pointer;

    transition: .2s;
}

.btn-voltar:hover{
    background: #f1f1f1;
}

/* menu dropdown */
.menu-dropdown{
    position: relative;
}

.btn-menu{
    background: white;
    color: #0089c4;

    border: none;
    border-radius: 5px;

    padding: 8px 18px;

    font-weight: bold;

    cursor: pointer;
}

/* submenu */
.submenu{
    position: absolute;

    top: 100%;
    right: 0;

    background: white;

    width: 240px;

    border-radius: 6px;

    overflow: hidden;

    box-shadow: 0 5px 15px rgba(0,0,0,.15);

    display: none;

    margin-top: 2px;

    z-index: 999999;
}

/* mostrar hover */
.menu-dropdown:hover .submenu{
    display: block;
}

.submenu a{
    display: block;

    padding: 14px 18px;

    color: #333;

    text-decoration: none;

    font-weight: 500;

    transition: .2s;
}

.submenu a:hover{
    background: #f5f5f5;
    color: #0089c4;
}

========================= */

    cursor: pointer;

    display: none;

    z-index: 999999;

    box-shadow: 0 5px 15px rgba(0,0,0,.25);

    transition: .3s;
}

.btn-topo:hover{

}

/* ===== EXCEL ===== */
document.getElementById('input-excel').addEventListener('change', function(e){
    const reader = new FileReader();
    reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data,{type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        dadosExcel = XLSX.utils.sheet_to_json(sheet);
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

/* ===== LOGO ===== */
document.getElementById('input-logo').addEventListener('change', function(e){
    const reader = new FileReader();
    reader.onload = function(evt){
        logoBase64 = evt.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
});

/* ===== FUNÇÕES AUXILIARES ===== */
function formatarData(data){

    if(!data) return "";

    // DATA VINDO DO EXCEL
    if(typeof data === "number"){

        const excelDate = XLSX.SSF.parse_date_code(data);

        const dia = String(excelDate.d).padStart(2,'0');
        const mes = String(excelDate.m).padStart(2,'0');
        const ano = excelDate.y;

        return `${dia}/${mes}/${ano}`;
    }

    // STRING
    const d = new Date(data);

    if(isNaN(d)) return data;

    const dia = String(d.getDate()).padStart(2,'0');
    const mes = String(d.getMonth() + 1).padStart(2,'0');
    const ano = d.getFullYear();

    return `${dia}/${mes}/${ano}`;
}

// descrição dinâmica
function classificarDescricao(texto){
    texto = String(texto || "");

    if(texto.length <= 20) return "descricao-curta";
    if(texto.length <= 35) return "descricao-media";
    return "descricao-longa";
}

// separar preço
function separarPreco(valor){
    if(!valor) return { reais: "0", centavos: "00" };

    valor = String(valor).replace(",", ".");
    let numero = Number(valor).toFixed(2);
    let partes = numero.split(".");

    return {
        reais: partes[0],
        centavos: partes[1]
    };
}

// tamanho do preço (DE)
function classificarPreco(reais){
    reais = String(reais || "0");

    if(reais.length <= 1) return "preco-pequeno";
    if(reais.length === 2) return "preco-medio";
    return "preco-grande";
}

// tamanho do preço PROMO
function classificarPrecoPromo(reais){
    reais = String(reais || "0");

    if(reais.length <= 1) return "preco-promo-pequeno";
    if(reais.length === 2) return "preco-promo-medio";
    return "preco-promo-grande";
}

/* ===== GERAR ===== */
function gerar(){
    const tipo = document.getElementById('tamanho').value;
    const area = document.getElementById('area-pdf');

    if(!tipo || dadosExcel.length === 0){
        alert("Importe planilha e selecione tamanho");
        return;
    }

    area.className = tipo;
    area.innerHTML = "";

    let etiquetasPorFolha = 1;
    if(tipo === "p") etiquetasPorFolha = 6;
    if(tipo === "m") etiquetasPorFolha = 4;
    if(tipo === "g") etiquetasPorFolha = 1;

    let contador = 0;
    let folha = `<div class="folha">`;

    dadosExcel.forEach((item, index) => {

        if(tipo === "p") folha += criarEtiquetaP(item);
        else if(tipo === "m") folha += criarEtiquetaM(item);
        else if(tipo === "g") folha += criarEtiquetaG(item);

        contador++;

        if(contador === etiquetasPorFolha || index === dadosExcel.length - 1){
            folha += `</div>`;
            area.innerHTML += folha;
            folha = `<div class="folha">`;
            contador = 0;
        }
    });
}

    </div>
          
     
  

</div>
`;
}

/* ===== PDF ===== */
function gerarPDF(){
    const element = document.getElementById('area-pdf');

    html2pdf().set({
        margin:0,
        filename:'etiquetas.pdf',
        html2canvas:{scale:2},
        jsPDF:{unit:'cm',format:'a4'}
    }).from(element).save();
}

/* ===== LIMPAR ===== */
function limpar(){
    dadosExcel = [];
    logoBase64 = "";

    document.getElementById('input-excel').value = "";

    document.getElementById('tamanho').value = "";

    document.getElementById('area-pdf').innerHTML = "";
}

function voltarPagina(){

    window.history.back();

}

function toggleMenu(){

    const menu = document.getElementById("submenu");

    if(menu.style.display === "block"){

        menu.style.display = "none";

    }else{

        menu.style.display = "block";
    }

}

/* fecha clicando fora */
document.addEventListener("click", function(event){

    const menu = document.getElementById("submenu");

    const botao = document.querySelector(".btn-menu");

    if(
        !menu.contains(event.target)
        &&
        !botao.contains(event.target)
    ){
        menu.style.display = "none";
    }

});

window.addEventListener("scroll", function(){
