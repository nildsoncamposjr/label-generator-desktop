<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Consulta de Produtos</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>

/* =========================
   BASE
========================= */

body{
    background: #f5f6fa;
    font-family: Arial, sans-serif;
}

/* =========================
   TOPO
========================= */

.topo{
    width: 100%;
    background: #0089c4;
    padding: 18px 30px;
    color: white;
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
}

.topo h2{
    margin: 0;
    font-size: 28px;
}

/* =========================
   CONTAINER
========================= */

.container-consulta{
    width: 95%;
    margin: 30px auto;
}

/* =========================
   CARD
========================= */

.card-consulta{

    background: white;

    border-radius: 10px;

    padding: 25px;

    box-shadow: 0 5px 15px rgba(0,0,0,.08);
}

/* =========================
   BUSCA
========================= */

.input-busca{
    height: 45px;
    border-radius: 6px;
    border: 1px solid #ccc;
    padding-left: 15px;
    margin-bottom: 20px;
}

/* =========================
   TABELA
========================= */

.table thead{
    background: #0089c4;
    color: white;
}

.table td{
    vertical-align: middle;
}

/* =========================
   CHECKBOX
========================= */

.check-produto{
    width: 18px;
    height: 18px;
}

/* =========================
   BOTÕES
========================= */

.btn-acao{
    background: #0089c4;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    margin-right: 10px;
    transition: .2s;
}

.btn-acao:hover{
    background: #006fa1;
    color: white;
}

/* =========================
   TAG PROMO
========================= */

.tag-promo{

    background: #d4edda;

    color: #155724;

    padding: 5px 10px;

    border-radius: 30px;

    font-size: 13px;

    font-weight: bold;
}

/* =========================
   RODAPÉ
========================= */

.rodape-info{
    margin-top: 20px;
    font-size: 14px;
    color: #666;
}

</style>

</head>
<body>

<!-- TOPO -->
<div class="topo">

    <h2>Consulta de Produtos</h2>

</div>

<!-- CONTAINER -->
<div class="container-consulta">

    <div class="card-consulta">

        <!-- BUSCA -->
        <input 
            type="text"
            class="form-control input-busca"
            placeholder="Pesquisar produto..."
            id="campoBusca"
            onkeyup="filtrarProdutos()"
        >

        <!-- BOTÕES -->
        <div class="mb-3">

            <button class="btn-acao" onclick="selecionarTodos()">
                Selecionar Todos
            </button>

            <button class="btn-acao" onclick="desmarcarTodos()">
                Desmarcar Todos
            </button>

            <button class="btn-acao">
                Gerar Etiquetas
            </button>

        </div>

        <!-- TABELA -->
        <div class="table-responsive">

            <table class="table table-bordered table-hover">

                <thead>

                    <tr>

                        <th width="60">OK</th>
                        <th>Produto</th>
                        <th width="180">EAN</th>
                        <th width="120">Promoção</th>
                        <th width="120">Status</th>

                    </tr>

                </thead>

                <tbody id="tabelaProdutos">

                    <tr>

                        <td align="center">
                            <input type="checkbox" class="check-produto" checked>
                        </td>

                        <td>Vitamina C 1G 30 Comprimidos</td>

                        <td>789123456789</td>

                        <td>R$ 19,90</td>

                        <td>
                            <span class="tag-promo">
                                Ativo
                            </span>
                        </td>

                    </tr>

                    <tr>

                        <td align="center">
                            <input type="checkbox" class="check-produto" checked>
                        </td>

                        <td>Dipirona 1G 10 Comprimidos</td>

                        <td>789999999999</td>

                        <td>R$ 12,50</td>

                        <td>
                            <span class="tag-promo">
                                Ativo
                            </span>
                        </td>

                    </tr>

                    <tr>

                        <td align="center">
                            <input type="checkbox" class="check-produto">
                        </td>

                        <td>Shampoo Anticaspa 200ml</td>

                        <td>789888888888</td>

                        <td>R$ 15,99</td>

                        <td>
                            <span class="tag-promo">
                                Ativo
                            </span>
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

        <!-- INFO -->
        <div class="rodape-info">

            3 produtos carregados.

        </div>

    </div>

</div>

<script>

/* =========================
   FILTRO
========================= */

function filtrarProdutos(){

    let input = document
        .getElementById("campoBusca")
        .value
        .toLowerCase();

    let linhas = document.querySelectorAll("#tabelaProdutos tr");

    linhas.forEach(linha => {

        let texto = linha.innerText.toLowerCase();

        linha.style.display = texto.includes(input)
            ? ""
            : "none";

    });

}

/* =========================
   SELECIONAR TODOS
========================= */

function selecionarTodos(){

    let checks = document.querySelectorAll(".check-produto");

    checks.forEach(check => {
        check.checked = true;
    });

}

/* =========================
   DESMARCAR TODOS
========================= */

function desmarcarTodos(){

    let checks = document.querySelectorAll(".check-produto");

    checks.forEach(check => {
        check.checked = false;
    });

}

</script>

</body>
</html>
