/* =========================
   ===== NAVBAR SUPERIOR
========================= */

.topbar{
    width: 100%;
    height: 60px;

    background: #0089c4;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 25px;

    position: fixed;
    top: 0;
    left: 0;

    z-index: 99999;

    box-shadow: 0 2px 10px rgba(0,0,0,.15);
}

/* botão voltar */
.btn-voltar{
    background: white;
    color: #0089c4;

    border: none;
    border-radius: 5px;

    padding: 8px 16px;

    font-weight: bold;

    cursor: pointer;

    transition: .2s;
}

.btn-voltar:hover{
    background: #f1f1f1;
}

/* menu dropdown */
.menu-dropdown{
    position: relative;
}

.btn-menu{
    background: white;
    color: #0089c4;

    border: none;
    border-radius: 5px;

    padding: 8px 18px;

    font-weight: bold;

    cursor: pointer;
}

/* submenu */
.submenu{
    position: absolute;

    top: 100%;
    right: 0;

    background: white;

    width: 240px;

    border-radius: 6px;

    overflow: hidden;

    box-shadow: 0 5px 15px rgba(0,0,0,.15);

    display: none;

    margin-top: 2px;

    z-index: 999999;
}

/* mostrar hover */
.menu-dropdown:hover .submenu{
    display: block;
}

.submenu a{
    display: block;

    padding: 14px 18px;

    color: #333;

    text-decoration: none;

    font-weight: 500;

    transition: .2s;
}

.submenu a:hover{
    background: #f5f5f5;
    color: #0089c4;
}

<!-- =========================
ÁREA ETIQUETAS
========================= -->

<div id="areaEtiquetas"></div>

<script>

/* =========================
DADOS
========================= */

let dadosPlanilha = [];

/* =========================
LER PLANILHA
========================= */

document.getElementById('input-excel')
        .addEventListener('change', lerPlanilha);

function lerPlanilha(e){

    const reader = new FileReader();

    reader.onload = evt => {

        const workbook = XLSX.read(
            new Uint8Array(evt.target.result),
            {type:'array'}
        );

        const sheet = workbook.Sheets[
            workbook.SheetNames[0]
        ];

        dadosPlanilha = XLSX.utils.sheet_to_json(sheet);

        console.log(dadosPlanilha);

    };

    reader.readAsArrayBuffer(e.target.files[0]);

}

/* =========================
FORMATAR DATA
========================= */

function formatarDataExcel(valor){

    if(typeof valor === "number"){

        let d = XLSX.SSF.parse_date_code(valor);

        return `${String(d.d).padStart(2,'0')}/${String(d.m).padStart(2,'0')}/${String(d.y).slice(-2)}`;
    }

    return valor || "";
}

/* =========================
SEPARAR PREÇO
========================= */

function separarPreco(valor){

    if(!valor){

        return {
            reais:"0",
            centavos:"00"
        };
    }

    let numero = valor.toString().replace(",", ".");

    let formatado = parseFloat(numero).toFixed(2);

    let partes = formatado.split(".");

    return {

        reais: partes[0],
        centavos: partes[1]

    };

}

/* =========================
CLASSE PREÇO
========================= */

function classificarPreco(reais, tipo){

    reais = String(reais || "0");

    if(reais.length <= 1){

        return `${tipo}-pequeno`;

    }else if(reais.length === 2){

        return `${tipo}-medio`;

    }else{

        return `${tipo}-grande`;
    }

}

/* =========================
DESCRIÇÃO
========================= */

function analisarDescricao(texto){

    if(!texto) return "desc-curta";

    let tamanho = texto.length;

    if(tamanho <= 25){

        return "desc-curta";

    }else if(tamanho <= 40){

        return "desc-media";

    }else{

        return "desc-longa";
    }

}

/* =========================
ESTRUTURA BASE
========================= */

function criarEstruturaEtiqueta(item,tamanho){

    let precoNormal = separarPreco(item.valor);

    let precoFinal = separarPreco(item.preco);

    let classeDescricao = analisarDescricao(item.descricao);

    return `

    <div class="etiqueta ${tamanho}">

        <div class="linha"></div>

        <div class="topo">

            <div class="descricao ${classeDescricao}">
                ${item.descricao || ""}
            </div>

            <div class="ean">
                EAN: ${item.ean || ""}
            </div>

            <div class="validade">
                *Oferta válida de
                ${formatarDataExcel(item.data_inicio)}
                até
                ${formatarDataExcel(item.data_fim)}
            </div>

            <div class="preco-original">

                <div class="bloco-de">
                    <span class="text-de">DE</span>
                </div>

                <div class="bloco-moeda">
                    <span class="moeda">R$:</span>
                </div>

                <div class="bloco-reais">

                    <span class="reais ${classificarPreco(precoNormal.reais,'preco-normal')}">
                        ${precoNormal.reais}
                    </span>

                </div>

                <div class="bloco-centavos">

                    <span class="centavos">
                        ,${precoNormal.centavos}
                    </span>

                </div>
             <div class="bloco-cada">

                    <span class="text-cada">
                        CADA
                    </span>

                </div>
            </div>

        </div>

        <div class="bloco-promo">

            <div class="titulo-promo">
                COMBINE E GANHE
            </div>

            <div class="combine">

                <div class="bloco">
                    <span class="text-combine">
                        Combine
                    </span>
                </div>

                <div class="bloco-qtd">

                    <span class="text-qtd">
                        ${item.quantidade || 0}
                    </span>

                </div>

                <div class="bloco-ou">

                    <span class="text-ou">
                        ou mais
                    </span>

                </div>

                <div class="bloco-produto">

                    <span class="text-produto">
                        produtos
                    </span>

                </div>

                <div class="bloco-para">

                    <span class="text-para" style="color: white;">
    para
</span>

                </div>

                <div class="bloco-cabelo">

                    <span class="text-cabelo">
                        ${item.categoria || ""}
                    </span>

                </div>

            </div>

            <div class="bloco-gp">

                <div class="ganhe">

                    <span class="text-ganhe">
                        Ganhe
                    </span>

                </div>

                <div class="bloco-percentual">

                    <span class="percentual">
                        ${item.porcentagem || 0}
                    </span>

                </div>

                <div class="bloco-sinalp">

                    <span class="text-sinalp">
                        %
                    </span>

                </div>

                <div class="bloco-desc">

                    <span class="text-desc">DE</span>
       

                </div>

                <div class="bloco-desco">

                    <span class="text-desco">DESCONTO</span>

                </div>

            </div>

            <div class="preco-final">

                <div class="bloco-por">

                    <span class="text-por">
                        POR
                    </span>

                </div>

                <div class="bloco-pfmoeda">

                    <span class="pfmoeda">
                        R$:
                    </span>

                </div>

                <div class="bloco-pfreais">

                    <span class="text-pfreais ${classificarPreco(precoFinal.reais,'preco-final')}">
                        ${precoFinal.reais}
                    </span>

                </div>

                <div class="bloco-pfcentavos">

                    <span class="pfcentavos">
                        ,${precoFinal.centavos}
                    </span>

                </div>

                <div class="bloco-pfcada">
                  <span class="text-pfcada">CADA</span>
                  </div>

            </div>

        </div>

    </div>

    `;
}

/* =========================
ETIQUETA P
========================= */

function criarEtiquetaP(item){

    return criarEstruturaEtiqueta(item,"p");

}

/* =========================
ETIQUETA M
========================= */

function criarEtiquetaM(item){

    return criarEstruturaEtiqueta(item,"m");

}

/* =========================
ETIQUETA G
========================= */

function criarEtiquetaG(item){

    return criarEstruturaEtiqueta(item,"g");

}

/* =========================
GERAR
========================= */

function gerar(){

    const tipo = document.getElementById("tamanho").value;

    const area = document.getElementById("areaEtiquetas");

    if(!tipo){

        alert("Selecione um tamanho");

        return;
    }

    if(dadosPlanilha.length === 0){

        alert("Importe uma planilha");

        return;
    }

    area.className = tipo;

    area.innerHTML = "";

    let etiquetasPorFolha = 1;

    if(tipo === "p"){

        etiquetasPorFolha = 6;

    }else if(tipo === "m"){

        etiquetasPorFolha = 4;

    }else if(tipo === "g"){

        etiquetasPorFolha = 1;
    }

    let contador = 0;

    let html = `<div class="folha">`;

    dadosPlanilha.forEach((item,index)=>{

        if(tipo === "p"){

            html += criarEtiquetaP(item);

        }else if(tipo === "m"){

            html += criarEtiquetaM(item);

        }else{

            html += criarEtiquetaG(item);
        }

        contador++;

        if(
            contador === etiquetasPorFolha
            &&
            index !== dadosPlanilha.length - 1
        ){

            html += `</div><div class="folha">`;

            contador = 0;
        }

    });

    html += `</div>`;

    area.innerHTML = html;

}

/* =========================
LIMPAR
========================= */

function limpar(){

    document.getElementById("areaEtiquetas").innerHTML = "";

    document.getElementById("input-excel").value = "";

    document.getElementById("tamanho").value = "";

    dadosPlanilha = [];

}

PDF

/* =========================

========================= */

function toggleMenu(){

    const menu = document.getElementById("submenu");

    if(menu.style.display === "block"){

        menu.style.display = "none";

    }else{

        menu.style.display = "block";
    }

}

/* =========================
FECHAR MENU
========================= */

document.addEventListener("click", function(event){

    const menu = document.getElementById("submenu");

    const botao = document.querySelector(".btn-menu");

    if(
        !menu.contains(event.target)
        &&
        !botao.contains(event.target)
    ){

        menu.style.display = "none";
    }

});

/* =========================
BOTÃO TOPO
========================= */

window.addEventListener("scroll", function(){

    const botao = document.getElementById("btnTopo");

    if(window.scrollY > 300){

        botao.style.display = "block";

    }else{

        botao.style.display = "none";
    }

});

function voltarTopo(){

    window.scrollTo({

        top: 0,
        behavior: "smooth"

    });

}
