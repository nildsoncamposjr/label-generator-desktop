/* =========================
   ===== NAVBAR SUPERIOR
========================= */

.topbar{
    width: 100%;
    height: 60px;

    background: #0089c4;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 25px;

    position: fixed;
    top: 0;
    left: 0;

    z-index: 99999;

    box-shadow: 0 2px 10px rgba(0,0,0,.15);
}

/* botão voltar */
.btn-voltar{
    background: white;
    color: #0089c4;

    border: none;
    border-radius: 5px;

    padding: 8px 16px;

    font-weight: bold;

    cursor: pointer;

    transition: .2s;
}

.btn-voltar:hover{
    background: #f1f1f1;
}

/* menu dropdown */
.menu-dropdown{
    position: relative;
}

.btn-menu{
    background: white;
    color: #0089c4;

    border: none;
    border-radius: 5px;

    padding: 8px 18px;

    font-weight: bold;

    cursor: pointer;
}

/* submenu */
.submenu{
    position: absolute;

    top: 100%;
    right: 0;

    background: white;

    width: 240px;

    border-radius: 6px;

    overflow: hidden;

    box-shadow: 0 5px 15px rgba(0,0,0,.15);

    display: none;

    margin-top: 2px;

    z-index: 999999;
}

/* mostrar hover */
.menu-dropdown:hover .submenu{
    display: block;
}

.submenu a{
    display: block;

    padding: 14px 18px;

    color: #333;

    text-decoration: none;

    font-weight: 500;

    transition: .2s;
}

.submenu a:hover{
    background: #f5f5f5;
    color: #0089c4;
}

<script>


let logoBase64 = "";
let dadosPlanilha = [];

/* =========================
   LOGO
========================= */
document.getElementById("input-logo").addEventListener("change", function(e){

    const reader = new FileReader();

    reader.onload = e => {
        logoBase64 = e.target.result;
    };

    reader.readAsDataURL(e.target.files[0]);

});

/* =========================
   PLANILHA
========================= */
document.getElementById('input-excel').addEventListener('change', lerPlanilha);

function lerPlanilha(e){

    const reader = new FileReader();

    reader.onload = evt => {

        const workbook = XLSX.read(
            new Uint8Array(evt.target.result),
            {type:'array'}
        );

        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        dadosPlanilha = XLSX.utils.sheet_to_json(sheet);

    };

    reader.readAsArrayBuffer(e.target.files[0]);

}

/* =========================
   FORMATAR DATA
========================= */
function formatarDataExcel(valor){

    if(typeof valor === "number"){

        let d = XLSX.SSF.parse_date_code(valor);

        return `${String(d.d).padStart(2,'0')}/${String(d.m).padStart(2,'0')}/${d.y}`;
    }

    return valor || "";
}

/* =========================
   DESCRIÇÃO DINÂMICA
========================= */
function analisarDescricao(texto){

    if(!texto) return "desc-curta";

    let tamanho = texto.length;

    if(tamanho <= 22) return "desc-curta";
    else if(tamanho <= 35) return "desc-media";
    else return "desc-longa";

}

/* =========================
   SEPARAR PREÇO
========================= */
function separarPreco(valor){

    if(!valor){

        return {
            reais:"0",
            centavos:"00"
        };
    }

    let numero = valor.toString().replace(",", ".");

    let formatado = parseFloat(numero).toFixed(2);

    let partes = formatado.split(".");

    return {
        reais:partes[0],
        centavos:partes[1]
    };
}

/* =========================
   ANALISAR PREÇO
========================= */
function analisarPreco(valor){

    if(!valor){

        return {
            antes:1,
            depois:2
        };
    }

    let texto = valor.toString().replace(",", ".");

    let partes = texto.split(".");

    return {

        antes: partes[0]
            ? partes[0].length
            : 1,

        depois: partes[1]
            ? partes[1].length
            : 0
    };
}

/* =========================
   GERAR
========================= */
function gerar(){

    const tipo = document.getElementById("tamanho").value;

    const area = document.getElementById("areaEtiquetas");

    if(!tipo){

        alert("Selecione um tamanho");
        return;
    }

    if(dadosPlanilha.length === 0){

        alert("Importe uma planilha");
        return;
    }

    area.className = tipo;

    area.innerHTML = "";

    let etiquetasPorFolha = 1;

    if(tipo === "p") etiquetasPorFolha = 6;
    if(tipo === "m") etiquetasPorFolha = 4;
    if(tipo === "g") etiquetasPorFolha = 1;

    let contador = 0;

    let folha = `<div class="folha">`;

    dadosPlanilha.forEach((item,index)=>{

        if(tipo === "p"){

            folha += criarEtiquetaP(item);

        }else if(tipo === "m"){

            folha += criarEtiquetaM(item);

        }else if(tipo === "g"){

            folha += criarEtiquetaG(item);
        }

        contador++;

        if(
            contador === etiquetasPorFolha
            ||
            index === dadosPlanilha.length - 1
        ){

            folha += `</div>`;

            area.innerHTML += folha;

            folha = `<div class="folha">`;

            contador = 0;
        }

    });

}

/* ===== LIMPAR ===== */

/* =========================
   ETIQUETA P
========================= */
function criarEtiquetaP(item){

    return criarEstruturaEtiqueta(item,"p");

}

/* =========================
   ETIQUETA M
========================= */
function criarEtiquetaM(item){

    return criarEstruturaEtiqueta(item,"m");

}

/* =========================
   ETIQUETA G
========================= */
function criarEtiquetaG(item){

    return criarEstruturaEtiqueta(item,"g");

}

/* =========================
   ESTRUTURA BASE
========================= */
function criarEstruturaEtiqueta(item,tamanho){
    
    let preco = separarPreco(item.valor_de);

    //valor promo como número
  let valorPromoNumero = Number(
    String(item.total_promo || 0)
        .replace(/\s/g, "")
        .replace(",", ".")
);

// regra principal
//se menor que 10 usa total_promo
//senão usa valor_promo
let valorFinalPromo = valorPromoNumero <= 10
    ? item.total_promo
    : item.valor_promo;

// valor que será exibido
let promo = separarPreco(valorFinalPromo);
let valorFinalNumero = Number(
    String(valorFinalPromo)
        .replace(/\s/g, "")
        .replace(",", ".")
);

//mostrar texto CADA somente >=10
let textoCadaPromo = "";
console.log({
    valorPromoNumero,
    valorFinalPromo,
    valorFinalNumero,
    valor_promo: item.valor_promo,
    total_promo: item.total_promo
});
if(valorPromoNumero > 10){

    textoCadaPromo = `
        <div style="margin-top:-3px; margin-left:179px; font-size:11px; font-weight:bold; color:white">
            <span class="text-pcada">CADA</span>
        </div>
    `;

}else{

       textoCadaPromo = `
    <div class="texto-unitario">
        *Valor unitário promocional: R$ ${
            Number(
                String(item.valor_promo)
                    .replace(",", ".")
            ).toFixed(2).replace(".", ",")
        }
    </div>

    `;
}
    let analise = analisarPreco(item.valor_de);

    let analisePromo = analisarPreco(valorFinalPromo);

    let classeDescricao = analisarDescricao(item.descricao);

    let classeAntes = analise.antes === 1
        ? "antes-1"
        : analise.antes === 2
        ? "antes-2"
        : "antes-3";

    let classeAntesPromo = analisePromo.antes === 1
        ? "p-antes-1"
        : analisePromo.antes === 2
        ? "p-antes-2"
        : "p-antes-3";

    return `

    <div class="etiqueta">

        <div class="linha-pontilhada"></div>

        <!-- DESCRIÇÃO -->
        <div class="bloco-descricao ${classeDescricao}">
           <span class="text-descricao">${item.descricao || ""}</span>
        </div>

        <!-- EAN -->
        <div class="bloco-ean">
            <span class="text-ean">EAN: ${item.ean || ""}</span>
        </div>

        <!-- VALIDADE -->
        <div class="bloco-validade">

            <span class="text-validade">*Oferta válida de ${formatarDataExcel(item.data_inicio)} até ${formatarDataExcel(item.data_fim)}</span>

        </div>

        <!-- PREÇO NORMAL -->
        <div class="bloco-preco">
            
            <div class="bloco-de">
            <span class="text-de">DE</span>
            </div> 

            <div class="bloco-moeda">
                <span class="text-moeda">R$</span>
            </div>

            <div class="bloco-reais">
                <span class="text-reais ${classeAntes}">${preco.reais}</span>
            </div>

            <div class="bloco-centavos">
                <span class="text-centavos">,${preco.centavos}</span>
            </div>

            <div class="bloco-cada">
                <span class="text-cada">CADA</span>
            </div>

        </div>
        


        <!-- PROMO -->
        <div class="bloco-promo">

            
            <div class="promo-preco">

                <div class="bloco-pmoeda">
                   <span class="text-pmoeda">R$</span>
                </div>

                <div class="bloco-preais">
                    <span class="text-preais ${classeAntesPromo}">${promo.reais}</span>
                </div>

                <div class="bloco-pcentavos">

                    <span class="text-pcentavos">
                        ,${promo.centavos}
                    </span>

                </div>
               ${textoCadaPromo}
            </div>

        </div>
        
        <div class="bloco-levemais">

                <span class="text-levemais">LEVE ${item.quantidade || ""} POR</span>

            </div>
            <!-- LOGO -->
<div class="bloco-logo">
    <img src="${logoBase64}" alt="Logo">
</div>
    </div>



    `;
}
