<script>

let dadosExcel = [];
let logoBase64 = "";

/* ===== EXCEL ===== */
document.getElementById('input-excel').addEventListener('change', function(e){
    const reader = new FileReader();
    reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data,{type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        dadosExcel = XLSX.utils.sheet_to_json(sheet);
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

/* ===== LOGO ===== */
document.getElementById('input-logo').addEventListener('change', function(e){
    const reader = new FileReader();
    reader.onload = function(evt){
        logoBase64 = evt.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
});

/* ===== FUNÇÕES AUXILIARES ===== */
function formatarData(data){

    if(!data) return "";

    // DATA VINDO DO EXCEL
    if(typeof data === "number"){

        const excelDate = XLSX.SSF.parse_date_code(data);

        const dia = String(excelDate.d).padStart(2,'0');
        const mes = String(excelDate.m).padStart(2,'0');
        const ano = excelDate.y;

        return `${dia}/${mes}/${ano}`;
    }

    // STRING
    const d = new Date(data);

    if(isNaN(d)) return data;

    const dia = String(d.getDate()).padStart(2,'0');
    const mes = String(d.getMonth() + 1).padStart(2,'0');
    const ano = d.getFullYear();

    return `${dia}/${mes}/${ano}`;
}

// descrição dinâmica
function classificarDescricao(texto){
    texto = String(texto || "");

    if(texto.length <= 20) return "descricao-curta";
    if(texto.length <= 35) return "descricao-media";
    return "descricao-longa";
}

// separar preço
function separarPreco(valor){
    if(!valor) return { reais: "0", centavos: "00" };

    valor = String(valor).replace(",", ".");
    let numero = Number(valor).toFixed(2);
    let partes = numero.split(".");

    return {
        reais: partes[0],
        centavos: partes[1]
    };
}

// tamanho do preço (DE)
function classificarPreco(reais){
    reais = String(reais || "0");

    if(reais.length <= 1) return "preco-pequeno";
    if(reais.length === 2) return "preco-medio";
    return "preco-grande";
}

// tamanho do preço PROMO
function classificarPrecoPromo(reais){
    reais = String(reais || "0");

    if(reais.length <= 1) return "preco-promo-pequeno";
    if(reais.length === 2) return "preco-promo-medio";
    return "preco-promo-grande";
}

/* ===== GERAR ===== */
function gerar(){
    const tipo = document.getElementById('tamanho').value;
    const area = document.getElementById('area-pdf');

    if(!tipo || dadosExcel.length === 0){
        alert("Importe planilha e selecione tamanho");
        return;
    }

    area.className = tipo;
    area.innerHTML = "";

    let etiquetasPorFolha = 1;
    if(tipo === "p") etiquetasPorFolha = 6;
    if(tipo === "m") etiquetasPorFolha = 4;
    if(tipo === "g") etiquetasPorFolha = 1;

    let contador = 0;
    let folha = `<div class="folha">`;

    dadosExcel.forEach((item, index) => {
        console.log(item);
        if(tipo === "p") folha += criarEtiquetaP(item);
        else if(tipo === "m") folha += criarEtiquetaM(item);
        else if(tipo === "g") folha += criarEtiquetaG(item);

        contador++;

        if(contador === etiquetasPorFolha || index === dadosExcel.length - 1){
            folha += `</div>`;
            area.innerHTML += folha;
            folha = `<div class="folha">`;
            contador = 0;
        }
    });

}

/* ===== ETIQUETA P ===== */
function criarEtiquetaP(item){
 return criarEtiquetaM(item);
}

/* ===== ETIQUETA M ===== */
function criarEtiquetaM(item){
    const preco = separarPreco(item.preco);
    const promoa = separarPreco(item.valor_a);
    const promob = separarPreco(item.valor_b)
    const promoc = separarPreco(item.valor_c)

    return `
<div class="etiqueta-m">

      <div class="linha-pontilhada"></div>
 
      <div class="bloco-descricao">
    <div class="${classificarDescricao(item.descricao)}">
        ${item.descricao}
    </div>
</div>

 <div class="bloco-ean">
        <span class="text-ean">EAN: ${item.ean || ""}</span>
        </div>
        
        <div class="bloco-validade">
            <span class="text-validade">*Oferta válida de ${formatarData(item.data_inicio)} até ${formatarData(item.data_fim)}</span>
            </div>
    
     <!-- PREÇO NORMAL -->

   <!-- PREÇO NORMAL -->
    <div class="bloco-preco">

        <div class="bloco-de">
            <span class="text-de">DE</span>
            </div>

            <div class="bloco-moeda">
                <span class="text-moeda">R$</span>
                </div>
                
                <div class="bloco-reais">
                    <span class="${classificarPreco(preco.reais)}">${preco.reais}</span>
                    </div>

                    <div class="bloco-centavos">
                        <span class="text-centavos">,${preco.centavos}</span>
                        </div>

                        <div class="bloco-cada">
                            <span class="text-cada">CADA</span>
                            </div>

                            </div>


       <!-- PREÇO DESCONTO PROGRESSIVO -->
    
           <div class="progressivo">
           
           <div class="quadro">
           <div class="l1">LEVE</div>
           <div class="la1">1</div>
           <div class="la2">UNIDADE(S)</div>

           <div class="l2">GANHE</div>
           <div class="lb2">${item.desconto_a}%</div>
           <div class="lb3">DE DESCONTO</div>

           <div class="l3">POR</div>
           <div class="lc2"><span class="${classificarPrecoPromo(promoa.reais)}">${promoa.reais}</span><span class="text-prcentavos">,${promoa.centavos}</span></div>
           <div class="lc3">CADA</div>
            </div>

            <div class="linha1"></div>

            <div class="quadro1">
             <div class="l1">LEVE</div>
           <div class="la1">2</div>
           <div class="la2">UNIDADE(S)</div>

/* ===== PDF ===== */
function gerarPDF(){
    const element = document.getElementById('area-pdf');

    html2pdf().set({
        margin:0,
        filename:'etiquetas.pdf',
        html2canvas:{scale:2},
        jsPDF:{unit:'cm',format:'a4'}
    }).from(element).save();
}

/* ===== LIMPAR ===== */
function limpar(){
    dadosExcel = [];
    logoBase64 = "";

    document.getElementById('input-excel').value = "";
    document.getElementById('input-logo').value = "";
    document.getElementById('tamanho').value = "";

    document.getElementById('area-pdf').innerHTML = "";
}

function voltarPagina(){

    window.history.back();

}

function toggleMenu(){

    const menu = document.getElementById("submenu");

    if(menu.style.display === "block"){

        menu.style.display = "none";

    }else{

        menu.style.display = "block";
    }

}

/* fecha clicando fora */
document.addEventListener("click", function(event){

    const menu = document.getElementById("submenu");

    const botao = document.querySelector(".btn-menu");

    if(
        !menu.contains(event.target)
        &&
        !botao.contains(event.target)
    ){
        menu.style.display = "none";
    }

});
/* =========================
   ===== BOTÃO TOPO
========================= */

window.addEventListener("scroll", function(){

    const botao = document.getElementById("btnTopo");

    if(window.scrollY > 300){

        botao.style.display = "block";

    }else{

        botao.style.display = "none";
    }

});

function voltarTopo(){

    window.scrollTo({

        top: 0,
        behavior: "smooth"

    });

}
