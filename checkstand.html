<body>
<button onclick="window.location.href='index.html'" class="btn btn-meu no-print">
   ← Voltar
</button>
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-body">

            <h4 class="bloco-titulo">Gerador de Etiquetas</h4>

            <div class="form-row align-items-center">
                <div class="col-md-6 mb-2">
                    <input type="file" id="input-excel" class="form-control-file">
                </div>
                <div class="form-group">
            <label>Upload da Logo</label>
            <input type="file" id="inputLogo" class="form-control-file">
          </div>

                <div class="col-md-3 mb-2">
                    <button onclick="gerarPDF()" class="btn btn-primary btn-block">
                        Gerar PDF
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<div id="area-pdf" class="folha mt-4"></div>

<script>

/* =========================
   LER EXCEL
========================= */
document.getElementById('input-excel').addEventListener('change', lerExcel);

function lerExcel(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: 'array' });

        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        dadosPlanilha = json; // 🔥 ADICIONE ESSA LINHA

        gerarEtiquetas(json);
    };

    reader.readAsArrayBuffer(file);
}
/* LOGO */
document.getElementById("inputLogo").addEventListener("change", function(e){
    const reader = new FileReader();

    reader.onload = function(event){
        logoBase64 = event.target.result;

        if(dadosPlanilha.length > 0){
            gerarEtiquetas(dadosPlanilha);
        }
    };

    reader.readAsDataURL(e.target.files[0]);
});

/* =========================
   GERAR ETIQUETAS
========================= */
function gerarEtiquetas(dados){
    const area = document.getElementById('area-pdf');
    area.innerHTML = '';

    dados.forEach(item => {
        area.innerHTML += criarEtiqueta(item);
    });
}
function classificarDescricao(textoDescricao){
    textoDescricao = String(textoDescricao || "");

    if(textoDescricao.length < 30){
        return "descricao-curta";
    } else if(textoDescricao.length > 48){
        return "descricao-maior";
    } else {
        return "descricao-longa";
    }
}

function classificarPrecoDe(reais){
    reais = String(reais || "0");

    if(reais.length <= 1){
        return "preco-de-pequeno";
    } else if(reais.length === 2){
        return "preco-de-medio";
    } else {
        return "preco-de-grande";
    }
}

function classificarPrecoPromo(reais){
    reais = String(reais || "0");

     if(reais.length <= 1){
        return "preco-promo-pequeno";
    } else if(reais.length === 2){
        return "preco-promo-medio";
    } else {
        return "preco-promo-grande";
    }
}


/* =========================
   SEPARAR PREÇO
========================= */
function separarPreco(valor){
    if(!valor) return { reais: "0", centavos: "00" };

    if(typeof valor === "string"){
        valor = valor.replace(',', '.');
    }

    let numero = Number(valor).toFixed(2);
    let partes = numero.split('.');

    return {
        reais: partes[0],
        centavos: partes[1]
    };
}

/* =========================
   FORMATAR DATA
========================= */
function formatarData(data){
    if(!data) return '';

    if(typeof data === "number"){
        const d = new Date((data - 25569) * 86400 * 1000);
        return d.toLocaleDateString('pt-BR');
    }

    const d = new Date(data);
    return d.toLocaleDateString('pt-BR');
}

/* =========================
   CRIAR ETIQUETA
========================= */
function criarEtiqueta(item){

    const precoDe = separarPreco(item.valor);
    const precoPor = separarPreco(item.preco_final);

    return `
        <div class="etiqueta">
            <div class="linha-pontilhada"></div>
            <div class="bloco-imagem">
            <img class="logo" src="${logoBase64 || 'https://via.placeholder.com/120x40?text=Logo'}">
            </div>
            <div class="bloco-superior">

            <div class="descricao ${classificarDescricao(item.descricao)}">
    ${item.descricao || ''}
</div>

           <div class="ean">
           <span class="ean">EAN: ${item.ean || ''}</div>
           </div>
          

           <div class="periodo">
           Ofertas válidas de ${formatarData(item.data_inicio)} até ${formatarData(item.data_fechamento)}
           </div>

            <!-- PREÇO ANTIGO -->
            <div class="valor-antigo">
                
                <div class="bloco-de">
                    <span class="text-de">DE:</span>
                    </div>

                <div class="bloco-rs">
                <span class="text-rs">R$</span>
                </div>
                
                <div class="bloco-reais">
                <span class="text-reais ${classificarPrecoDe(precoDe.reais)}">${precoDe.reais}</span>
                </div>
                
                <div class="bloco-centavos">
                <span class="text-centavos">,${precoDe.centavos}</span>
                </div>

            </div>

            <!-- PREÇO NOVO -->
            <div class="preco">

               
                                     
                       
                        
                        <div class="bloco-por">
                        <span class="text-por">POR</span>
                        </div>
                  
                        <div class="bloco-rspreco">
                        <span class="rs-precopromo">R$:</span>
                        </div>
                        
                        <div class="bloco-reaispreco">
                        <span class="reais-preco ${classificarPrecoPromo(precoPor.reais)}">${precoPor.reais}</span>
                        </div>

                        <div class="bloco-centavospreco">
                        <span class="centavos-preco">,${precoPor.centavos}</span>
                        </div>
                        </div>
                        

       
    `;
}

/* =========================
   GERAR PDF
========================= */
function gerarPDF(){
    const element = document.getElementById('area-pdf');

    html2pdf().set({
        margin: 0,
        filename: 'etiquetas.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: {
            unit: 'cm',
            format: 'a4',
            orientation: 'portrait'
        }
    }).from(element).save();
}

</script>
